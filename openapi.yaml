          type: string
        workflowName:
          type: string
        inputParameters:
          items:
            $ref: '#/components/schemas/InputParameter'
          type: array
        status:
          type: string
        results:
          items:
            $ref: '#/components/schemas/TaskResult'
          type: array
      type: object
    InputParameter:
      example:
        name: key
        value: parameter
      properties:
        name:
          type: string
        value:
          type: string
      required:
        - name
        - value
      type: object
    TaskResult:
      example:
        cli:
          output: output
          exitCode: 0
          error: error
          command:
            - command
            - command
        request:
          body: body
          statusCode: 6
        response:
          headers:
            - headers
            - headers
