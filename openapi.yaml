        deployment_id:
          description: ID of the latest configuration deployment
          type: string
          format: uuid
        reported_ts:
          type: string
          format: date-time
        updated_ts:
          type: string
          format: date-time
    ConnectionState:
      type: object
      properties:
        device_id:
          type: string
          format: uuid
          description: Device ID.
        status:
          type: string
          enum:
            - connected
            - disconnected
            - unknown
          description: Device status.
        updated_ts:
          description: Server-side timestamp of the last device information update.
          format: date-time
          type: string
        created_ts:
          description: Server-side timestamp of the device creation.
          format: date-time
          type: string
    FileUpload:
      type: object
      properties:
        path:
          type: string
          description: The destination path on the device
        uid:
          type: integer
          description: The numerical UID of the file on the device
        gid:
          type: integer
          description: The numerical GID of the file on the device
        mode:
          type: string
          description: The octal representation of the mode of the file on the device
        file:
          type: string
          format: binary
      required:
        - path
    Alert:
      description: Alert request
      type: object
      properties:
        name:
          description: |
            A descriptive name of the alert
          type: string
        level:
          description: |
            Alert severity level
          type: string
          enum:
            - OK
            - CRITICAL
        subject:
          $ref: '#/components/schemas/AlertSubject'
        timestamp:
          description: |
            Time and date when the alert occured
          type: string
          format: date-time
      required:
        - name
        - level
        - subject
        - timestamp
      example:
        name: mender-connect systemd service
        level: CRITICAL
        timestamp: '2019-07-21T17:32:28Z'
        subject:
          name: mender-connect
          status: not-running
          type: systemd.unit
          details:
            description: Description of an error.
            lines_before:
              - line_number: 1
                data: Line 1 from a log file
              - line_number: 2
                data: Line 2 from a log file
            line_matching:
              line_number: 3
              data: Line 3 from a log file
            lines_after:
              - line_number: 4
                data: Line 4 from a log file
              - line_number: 5
                data: Line 5 from a log file
    AlertSubject:
      description: |
        Alert subject: the description of the alert origin
      type: object
      properties:
        name:
          description: |
            Name of an entity that caused the alert
          type: string
        type:
          description: |
            The type of executable that triggered the alert.
          type: string
        status:
          description: |
            Status of an entity that caused the alert
          type: string
        details:
          $ref: '#/components/schemas/AlertDetails'
      required:
        - name
        - status
        - type
      example:
        name: mender-connect
        status: not-running
        type: systemd.unit
        details:
          description: Description of an error.
          lines_before:
            - line_number: 1
              data: Line 1 from a log file
            - line_number: 2
              data: Line 2 from a log file
          line_matching:
            line_number: 3
            data: Line 3 from a log file
          lines_after:
            - line_number: 4
              data: Line 4 from a log file
            - line_number: 5
              data: Line 5 from a log file
    AlertDetails:
      description: |
        Additional details on the alert.
      type: object
      properties:
        description:
          description: |
            Alert description.
          type: string
        lines_before:
          description: |
            Log lines before matched pattern.
          type: array
          items:
            $ref: '#/components/schemas/LineDescriptor'
          minItems: 1
          maxItems: 1024
        lines_after:
          description: |
            Log lines after matched pattern.
          type: array
          items:
            $ref: '#/components/schemas/LineDescriptor'
          minItems: 1
          maxItems: 1024
        line_matching:
          $ref: '#/components/schemas/LineDescriptor'
      example:
        description: Description of an error.
        lines_before:
          - line_number: 1
            data: Line 1 from a log file
          - line_number: 2
            data: Line 2 from a log file
        line_matching:
          line_number: 3
          data: Line 3 from a log file
        lines_after:
          - line_number: 4
            data: Line 4 from a log file
          - line_number: 5
            data: Line 5 from a log file
    LineDescriptor:
      description: |
        Describes the data and line of a pattern-matched log line.
      type: object
      properties:
        line_number:
          type: integer
          minimum: 1
        data:
          type: string
      required:
        - line_number
        - data
    DeviceMonitorConfiguration:
      description: |
        Monitor configuration data.
      allOf:
        - type: object
          properties:
            name:
              type: string
            status:
              type: string
            type:
              type: string
          required:
            - name
            - status
            - type
    MonitorDevice:
