            type:
              description: |
                Service type
              type: string
          required:
            - name
            - type
    DBusSubsystem:
      description: |
        dbus subsystem specific configuration
      type: object
      properties:
        dbus:
          type: object
          properties:
            name:
              description: |
                Check name.
              type: string
            pattern:
              description: |
                DBus pattern to look for
              type: string
            watch:
              description: |
                DBus watch expression
              type: string
            alert_expiration:
              description: |
                Number of seconds after which the alert is considered expired and an OK is sent
              type: integer
          required:
            - name
            - watch
            - pattern
    AttributeValue:
