        type:
          type: string
        retries:
          type: integer
        retryDelaySeconds:
          type: integer
        requires:
          type: array
          items:
            type: string
        cli:
          $ref: '#/components/schemas/CLIParams'
        http:
          $ref: '#/components/schemas/HTTPParams'
      description: Task definition
    Workflow:
      required:
        - name
        - tasks
        - version
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: integer
        schemaversion:
          type: integer
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        inputParameters:
          type: array
          items:
            type: string
    JobObject:
      type: object
      properties:
        id:
          type: string
        workflowName:
          type: string
        inputParameters:
          type: array
          items:
            $ref: '#/components/schemas/InputParameter'
        status:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/TaskResult'
        insert_time:
          type: string
          format: date-time
        version:
          type: string
