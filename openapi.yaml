            - status
            - type
        - oneOf:
            - $ref: '#/components/schemas/LogSubsystem'
            - $ref: '#/components/schemas/ServiceSubsystem'
            - $ref: '#/components/schemas/DBusSubsystem'
          discriminator:
            propertyName: type
    LogSubsystem:
      description: |
