      type: object
      properties:
        id:
          type: string
          description: Metadata Id.
          format: uuid
        issuer:
          type: string
          description: Metadata Issuer.
        valid_until:
          type: string
          description: Date after which the data is not valid.
          format: date-time
      description: Metadata structure.
      example:
        id: 84430f18-d464-5194-b8ef-b1a15161bb4c
        issuer: https://samltest.id/saml/idp
        valid_until: '2038-08-24T21:14:09Z'
    RoleV1:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: A unique name.
        description:
          type: string
          description: Description of the role, as shown in the UI.
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/RolePermission'
        permission_sets_with_scope:
          type: array
          items:
            $ref: '#/components/schemas/PermissionSetWithScope'
      description: Role descriptor.
      example:
        name: RBAC_ROLE_NAME
        description: Description of the role
        permission_sets_with_scope:
          - name: ReadReleases
          - name: ReadDevices
            scope:
              type: DeviceGroups
              value:
                - test
                - dev
    Role:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: A unique name.
        description:
          type: string
          description: Description of the role, as shown in the UI.
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/RolePermission'
        permission_sets_with_scope:
          type: array
          description: A list of permission sets with optional scope restrictions.
          items:
            $ref: '#/components/schemas/PermissionSetWithScope'
      description: Role descriptor.
      example:
        name: RBAC_ROLE_NAME
        description: Description of the role
        permissions:
          - action: http
            object:
              type: GET
              value: /api/v1/endpoint
          - action: http
            object:
              type: POST
              value: /api/v1/endpoint
    PermissionSet:
      required:
        - name
        - permissions
      type: object
      properties:
        name:
          type: string
          description: A unique name.
        action:
          type: string
        object:
          type: string
        description:
          type: string
          description: Description of the permission set.
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        supported_scope_types:
          type: array
          items:
            type: string
      description: Permission set descriptor.
    FeedbackProduct:
      type: object
      properties:
