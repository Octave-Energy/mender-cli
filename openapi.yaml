      description: |
        In both cases (SAML and OpenID Connect) we support the passing of the metadata URL
        which we will automatically query (via GET) and parse the response.
        Please note that in the case of OpenID Connect you have to pass the url via
        "well-known" field in json request, and in case of SAML you need to use xml
        element: "IdentityProviderUrl", for instance:
        "<IdentityProviderUrl>https://samltest.id/saml/idp</IdentityProviderUrl>".
