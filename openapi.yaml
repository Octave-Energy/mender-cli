          type: string
        method:
          type: string
        contentType:
          type: string
        body:
          type: string
        json:
          type: object
          properties: {}
        headers:
          type: object
          properties: {}
        statusCodes:
          type: array
          items:
            type: integer
        connectionTimeOut:
          type: integer
        readTimeOut:
          type: integer
      description: HTTP parameters
    Task:
      required:
        - name
        - type
