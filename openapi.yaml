            - rspi2
            - rspi0
          update_control_map:
            id: e1ba5bee-c45d-11eb-887d-3fd47bdc3990
            priority: 1
            states:
              ArtifactInstall_Enter:
                action: pause
      properties:
        id:
          description: Deployment ID (device unique)
          type: string
        artifact:
          $ref: '#/components/schemas/DeploymentInstructionsArtifactV2'
        update_control_map:
