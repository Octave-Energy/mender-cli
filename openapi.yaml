  /api/management/v1/useradm/users:
    get:
      tags:
        - User_Administration_Management API
      summary: |
        List all users registered under the tenant owning the JWT.
      operationId: List Users Management
      parameters:
        - name: id
          in: query
          description: |
            Limit result by user ID, can be repeated to include multiple users in the query.
          schema:
            type: string
        - name: email
          in: query
          description: |
            Limit result by user email, can be repeated to include multiple users in the query.
          schema:
            type: string
        - name: created_after
          in: query
          description: |
            Filter users created after timestamp (UNIX timestamp).
          schema:
            type: integer
        - name: created_before
          in: query
          description: |
            Filter users created before timestamp (UNIX timestamp).
          schema:
            type: integer
        - name: updated_after
          in: query
          description: |
            Filter users updated after timestamp (UNIX timestamp).
          schema:
            type: integer
        - name: updated_before
          in: query
          description: |
            Filter users updated before timestamp (UNIX timestamp).
          schema:
            type: integer
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                title: ListOfUsers
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - ManagementJWT: []
    post:
      tags:
        - User_Administration_Management API
      summary: |
        Create a new user under the tenant owning the JWT.
      operationId: Create User Management
      requestBody:
        description: New user data.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserNew'
        required: true
      responses:
        '201':
          description: The user was successfully created.
          headers:
            Location:
              description: URI for the newly created 'User' resource.
              schema:
                type: string
          content: {}
        '400':
          $ref: '#/components/responses/InvalidRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          description: |
            The email address is duplicated, password is too short, current password doesn't match or limit on maximum number of users has been exceeded.
            It is possible that the user with the given email address exists
            in a different organization. In this case Mender server will
            also produce an error because the email address has to be unique
            across all organizations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - ManagementJWT: []
