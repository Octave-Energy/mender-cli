  /api/management/v2/devauth/auto-auth:
    post:
      operationId: Automatically Authenticate Device
      security:
        - ManagementJWT: []
      tags:
        - Device_Authentication_Management API
      summary: Automatically accept a device
      description: |
        The caller presents device identity data and public key, and signs the request with a private key.
        If the request is valid the device is accepted, and a valid JWT authentication token is issued.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutoAuthRequest'
      parameters:
        - name: X-MEN-Signature
          in: header
          description: |
            Request signature.

            The request signature depends on the public key submitted in the
            AuthRequest. A summary of signature algorithms and format follows:

            | Type       | Digest              | Format                   | Algorithm    |
            |------------|---------------------|--------------------------|--------------|
            | RSA        | SHA256(AuthRequest) | Base64(Signature)        | [RFC2313]    |
            | ECDSA      | SHA256(AuthRequest) | Base64(ASN.1(SEQ{R, S})) | [ANSI x9.62] |
            | ED25519    | AuthRequest         | Base64(Signature)        | [RFC8032]    |
            *Remark:*
            For ECDSA, the signature constitutes two integers (R and S)
            in which case the binary signature is taken as the ASN.1 sequence of
            the two numbers in the given order.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Authentication successful - a new JWT is issued and returned.
          content:
