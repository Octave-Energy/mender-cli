paths:
  /api/internal/v1/auditlogs/alive:
    get:
      tags:
        - Audit_Logs_Auditlogs Internal
      summary: Get liveliness status of service
      operationId: Ping
      responses:
        '204':
          description: Successful response.
          content: {}
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/internal/v1/auditlogs/health:
    get:
      tags:
        - Audit_Logs_Auditlogs Internal
      summary: Get status of service
      operationId: Auditlogs Internal Check Health
      responses:
        '204':
          description: Successful response.
          content: {}
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/internal/v1/auditlogs/tenants/{tenant_id}:
    delete:
      tags:
        - Audit_Logs_Auditlogs Internal
      summary: Delete all the logs for given tenant.
      operationId: Delete Audit Logs
      parameters:
        - name: tenant_id
          in: path
          description: Tenant ID.
          required: true
          schema:
            type: string
      responses:
        '204':
          description: All the tenant logs have been successfully deleted.
          content: {}
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/internal/v1/auditlogs/tenants/{tenant_id}/logs:
    get:
      tags:
        - Audit_Logs_Auditlogs Internal
      summary: Returns a list of audit log objects.
      operationId: Get Audit Logs (internal)
      parameters:
        - name: tenant_id
          in: path
          description: Tenant ID.
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: Starting page.
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Number of results per page.
          schema:
            type: integer
            default: 10
        - name: created_before
          in: query
          description: List only log entries created before and equal to Unix timestamp (UTC)
          schema:
            type: integer
        - name: created_after
          in: query
          description: List only log entries created after and equal to Unix timestamp (UTC)
          schema:
            type: integer
        - name: actor_id
          in: query
          description: If present, limits the results only to logs where actor has given id.
          schema:
            type: string
        - name: actor_type
          in: query
          description: If present, limits the results only to logs where actor is of a given type.
          schema:
            type: string
            enum:
              - user
              - device
        - name: actor_email
          in: query
          description: If present, limits the results only to logs where actors has given email address.
          schema:
            type: string
        - name: object_id
          in: query
          description: If present, limits the results only to logs where object has given id.
          schema:
            type: string
        - name: object_type
          in: query
          description: If present, limits the results only to logs where object is of a given type.
          schema:
            type: string
            enum:
              - user
              - deployment
              - artifact
              - device
        - name: object_deployment_name
          in: query
          description: If present, limits the results only to logs where object is a deployment with a given name.
          schema:
            type: string
        - name: sort
          in: query
          description: |
            Supports sorting the log list by creation date.
            By default logs are sorted by creation date in descending order (newest first).
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        '200':
          description: Successful response.
          headers:
            X-Total-Count:
              description: Total number of devices matched query.
              schema:
                type: string
            Link:
              description: |
                Standard header used for page navigation, page relations: 'first', 'next' and 'prev'.
              schema:
                type: string
          content:
            application/json:
              schema:
                title: ListOfLogs
                type: array
                description: A list of audit logs is returned.
                items:
                  $ref: '#/components/schemas/AuditLog'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Audit_Logs_Auditlogs Internal
      summary: Log event.
      operationId: Save Audit Log
      parameters:
        - name: tenant_id
          in: path
          description: Tenant ID.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditLog'
        required: true
      responses:
        '201':
          description: Event has been successfully logged.
          content: {}
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/management/v1/auditlogs/logs:
    get:
      tags:
        - Audit_Logs_Auditlogs Management
      summary: Returns a paged list of audit log objects.
      operationId: Get Audit Logs
      parameters:
        - name: page
          in: query
          description: Starting page.
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Number of results per page.
          schema:
            type: integer
            default: 10
        - name: created_before
          in: query
          description: List only log entries created before and equal to Unix timestamp (UTC)
          schema:
            type: integer
        - name: created_after
          in: query
          description: List only log entries created after and equal to Unix timestamp (UTC)
          schema:
            type: integer
        - name: actor_id
          in: query
          description: If present, limits the results only to logs where the actor has a given id.
          schema:
            type: string
        - name: actor_type
          in: query
          description: If present, limits the results only to logs where the actor is of a given type.
          schema:
            type: string
            enum:
              - user
              - device
        - name: actor_email
          in: query
          description: If present, limits the results only to logs where the actor has a given email address.
          schema:
            type: string
        - name: object_id
          in: query
          description: If present, limits the results only to logs where the object has a given id.
          schema:
            type: string
        - name: object_type
          in: query
          description: If present, limits the results only to logs where the object is of a given type.
          schema:
            type: string
            enum:
              - tenant
              - user
              - deployment
              - artifact
              - device
        - name: object_deployment_name
          in: query
          description: If present, limits the results only to logs where the object is a deployment and has a given name.
          schema:
            type: string
        - name: sort
          in: query
          description: |
            Supports sorting the log list by creation date.
            By default logs are sorted by creation date in descending order (newest first).
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        '200':
          description: Successful response.
          headers:
            X-Total-Count:
              description: Total number of devices matched query.
              schema:
                type: string
            Link:
              description: |
                Standard header used for page navigation, page relations: 'first', 'next' and 'prev'.
              schema:
                type: string
          content:
            application/json:
              schema:
                title: ListOfLogs
                type: array
                description: A list of audit logs is returned.
                items:
                  $ref: '#/components/schemas/AuditLog'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          description: |
            The user has sent too many requests in a given amount of time.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - ManagementJWT: []
      x-mender-plan:
        - enterprise
  /api/management/v1/auditlogs/logs/export:
    get:
      tags:
        - Audit_Logs_Auditlogs Management
      summary: Returns a paged list of audit log objects in text/csv format.
      operationId: Export Audit Logs
      parameters:
        - name: limit
          in: query
          description: Limit number of logs returned
          schema:
            type: integer
        - name: created_before
          in: query
          description: List only log entries created before and equal to Unix timestamp (UTC)
          schema:
            type: integer
        - name: created_after
          in: query
          description: List only log entries created after and equal to Unix timestamp (UTC)
          schema:
            type: integer
        - name: actor_id
          in: query
          description: If present, limits the results only to logs where the actor has a given id.
          schema:
            type: string
        - name: actor_type
          in: query
          description: If present, limits the results only to logs where the actor is of a given type.
          schema:
            type: string
            enum:
              - user
              - device
        - name: actor_email
          in: query
          description: If present, limits the results only to logs where the actors has a given email address.
          schema:
            type: string
        - name: object_id
          in: query
          description: If present, limits the results only to logs where the object has a given id.
          schema:
            type: string
        - name: object_type
          in: query
          description: If present, limits the results only to logs where the object is of a given type.
          schema:
            type: string
            enum:
              - user
              - deployment
              - artifact
              - device
        - name: object_deployment_name
          in: query
          description: If present, limits the results only to logs where the object is a deployment and has a given name.
          schema:
            type: string
        - name: sort
          in: query
          description: |
            Supports sorting the log list by creation date.
            By default logs are sorted by creation date in descending order (newest first).
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: format_separator
          in: query
          description: |
            Format string used to separate nested fields in the exported csv header
          schema:
            type: string
            default: .
        - name: ignore
          in: query
          description: |
            Header fields to ignore in the exported document (e.g. ignore=actor.id)
          schema:
            type: string
      responses:
        '200':
          description: |
            Successful response.

            Document follows in response body (chunked encoding).
          content:
            text/csv:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          description: |
            The user has sent too many requests in a given amount of time.
          content:
            text/csv:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - ManagementJWT: []
      x-mender-plan:
        - enterprise
  /api/devices/v1/deployments/artifacts:
    get:
      description: |
        Returns a collection of up to 100 artifacts matching the provided release name and device type.
      operationId: Device List Artifacts
      parameters:
        - description: name of the release
          in: query
          name: release_name
          required: true
          schema:
            type: string
        - description: Device type of device
          in: query
          name: device_type
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              example:
                - id: 0c13a0e6-6b63-475d-8260-ee42a590e8ff
                  name: Application 1.0.0
                  description: Johns Monday test build
                  device_types_compatible:
                    - Beagle Bone
                  info:
                    format: mender
                    version: 3
                  updates:
                    - type_info:
                        type: rootfs-image
                      files:
                        - name: rootfs-image-1
                          checksum: cc436f982bc60a8255fe1926a450db5f195a19ad
                          size: 123
                          date: 2016-03-11T13:03:17.063+0000
                      meta_data: []
                  artifact_provides:
                    artifact_name: test
                    rootfs-image.checksum: 32714818ad6f98ee0185a52e23a475d89122e3efd2b2c26c733781c28e798c99
                    rootfs-image.version: test
                  artifact_depends:
                    device_type:
                      - test
                  clears_artifact_provides:
                    - rootfs-image.*
                  size: 36891648
                  modified: '2016-03-11T13:03:17.063493443Z'
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Artifact'
          description: Successful response.
        '400':
          $ref: '#/components/responses/InvalidRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - DeviceJWT: []
      summary: List artifacts filtering by release name and device type
      tags:
        - Deployments_Device API
  /api/devices/v1/deployments/artifacts/{id}:
    get:
      description: |
        Returns the details of a selected artifact.
      operationId: Device Show Artifact
      parameters:
        - description: Artifact identifier.
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              example:
                id: 0c13a0e6-6b63-475d-8260-ee42a590e8ff
                name: Application 1.0.0
                description: Johns Monday test build
                device_types_compatible:
                  - Beagle Bone
                info:
                  format: mender
                  version: 3
                updates:
                  - type_info:
                      type: rootfs-image
                    files:
                      - name: rootfs-image-1
                        checksum: cc436f982bc60a8255fe1926a450db5f195a19ad
                        size: 123
                        date: 2016-03-11T13:03:17.063+0000
                    meta_data: []
                artifact_provides:
                  artifact_name: test
                  rootfs-image.checksum: 32714818ad6f98ee0185a52e23a475d89122e3efd2b2c26c733781c28e798c99
                  rootfs-image.version: test
                artifact_depends:
                  device_type:
                    - test
                clears_artifact_provides:
                  - rootfs-image.*
                size: 36891648
                modified: '2016-03-11T13:03:17.063493443Z'
              schema:
                $ref: '#/components/schemas/Artifact'
          description: Successful response.
        '400':
          $ref: '#/components/responses/InvalidRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - DeviceJWT: []
      summary: Get the details of a selected artifact
      tags:
        - Deployments_Device API
  /api/devices/v1/deployments/artifacts/{id}/download:
    get:
      description: |
        Generates signed URL for downloading artifact file. URI can be used only
        with GET HTTP method. Link supports such HTTP headers: 'Range',
        'If-Modified-Since', 'If-Unmodified-Since' It is valid for specified
        period of time.
      operationId: Devices Download Artifact
      parameters:
        - description: Artifact identifier.
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactLink'
          description: Successful response.
        '400':
          $ref: '#/components/responses/InvalidRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - DeviceJWT: []
      summary: Get the download link of a selected artifact
      tags:
        - Deployments_Device API
  /api/devices/v1/deployments/device/deployments/next:
    get:
      description: |
        On success, either an empty response or a DeploymentInstructions object
        is returned depending on whether there are any pending updates.
      operationId: Device Check Update
      parameters:
        - description: currently installed artifact
          in: query
          name: artifact_name
          required: true
          schema:
            type: string
        - description: Device type of device
          in: query
          name: device_type
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              example:
                id: w81s4fae-7dec-11d0-a765-00a0c91e6bf6
                artifact:
                  artifact_name: my-app-0.1
                  source:
                    uri: https://aws.myupdatebucket.com/image123
                    expire: '2016-03-11T13:03:17.063493443Z'
                  device_types_compatible:
                    - rspi
                    - rspi2
                    - rspi0
              schema:
                $ref: '#/components/schemas/DeploymentInstructions'
          description: Successful response.
        '204':
          content: {}
          description: No updates for device.
        '400':
          $ref: '#/components/responses/InvalidRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - DeviceJWT: []
      summary: Get next update
      tags:
        - Deployments_Device API
    post:
      description: |
        Returns the next update to be installed on the device.
        Next update will be chosen based on parameters provided in the request
        body. Request body should contain artifact_provides object.
      operationId: Check Update Depends
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckUpdateDependsRequest'
        description: |
          Key-value map of strings which describes the artifact(s) installed on the device and the
          device itself. It is used to determine the next deployment. The keys device_type and
          artifact_name are mandatory, additional free-form key-value pairs can be specified.
        required: true
      responses:
        '200':
          content:
            application/json:
              example:
                id: w81s4fae-7dec-11d0-a765-00a0c91e6bf6
                artifact:
                  artifact_name: my-app-0.1
                  source:
                    uri: https://aws.my.update.bucket.com/image_123
                    expire: '2016-03-11T13:03:17.063493443Z'
                  device_types_compatible:
                    - rspi
                    - rspi2
                    - rspi0
              schema:
                $ref: '#/components/schemas/DeploymentInstructions'
          description: Successful response.
        '204':
          content: {}
          description: No updates for device.
        '400':
          $ref: '#/components/responses/InvalidRequestError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - DeviceJWT: []
      summary: Get a next update satisfying dependencies
      tags:
        - Deployments_Device API
  /api/devices/v1/deployments/device/deployments/{id}/status:
    put:
      description: |
        Updates the status of a deployment on a particular device. Final status
        of the deployment is required to be set to indicate the success or failure
        of the installation process. The status can not be changed when deployment
        status is set to aborted. Reporting of intermediate steps such as
        installing, downloading, rebooting is optional.
      operationId: Update Deployment Status
      parameters:
        - description: Deployment identifier.
          in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentStatus'
        description: Deployment status.
        required: true
      responses:
        '204':
          content: {}
          description: Status updated successfully.
        '400':
          $ref: '#/components/responses/InvalidRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          content: {}
          description: Status already set to aborted.
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - DeviceJWT: []
      summary: Update the device deployment status
      tags:
        - Deployments_Device API
  /api/devices/v1/deployments/device/deployments/{id}/log:
    put:
      description: |
        Set the log of a selected deployment. Messages are split by line in the payload.
      operationId: Report Deployment Log
      parameters:
        - description: Deployment identifier.
          in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentLog'
        description: Deployment log
        required: true
      responses:
        '204':
          content: {}
          description: The deployment log uploaded successfully.
        '400':
          $ref: '#/components/responses/InvalidRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - DeviceJWT: []
      summary: Upload the device deployment log
      tags:
        - Deployments_Device API
  /api/devices/v1/deployments/download/configuration/{deployment_id}/{device_type}/{device_id}:
    get:
      operationId: Fetch Configuration
      parameters:
        - description: Deployment UUID
          in: path
          name: deployment_id
          required: true
          schema:
            type: string
        - description: Device type of the calling device
          in: path
          name: device_type
          required: true
          schema:
            type: string
        - description: Device UUID
          in: path
          name: device_id
          required: true
          schema:
            type: string
        - description: Time of link expire
          in: query
          name: x-men-expire
          required: true
          schema:
            format: date-time
            type: string
        - description: Signature of the URL link
          in: query
          name: x-men-signature
          required: true
          schema:
            type: string
        - description: Device tenant ID
          in: query
          name: tenant_id
          schema:
            type: string
