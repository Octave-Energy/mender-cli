        device_id:
          type: string
          description: The device ID where this feedback was triggered for context.
          format: uuid
      description: AI feedback form.
    CLIParams:
      type: object
      properties:
        command:
          type: array
          items:
            type: string
        executionTimeOut:
          type: integer
      description: CLI parameters
    HTTPParams:
      type: object
      properties:
