        description:
          type: string
          description: Tag description.
        value:
          type: string
          description: The current value of the tag.
        timestamp:
          type: string
          description: |
            The date and time of last tag update in RFC3339 format.
          format: date-time
      description: Tag descriptor.
      example:
        name: environment
        description: Test environment
        value: test
        timestamp: '2016-10-19T17:23:01.639Z'
    Group:
      required:
        - group
      type: object
      properties:
        group:
          type: string
          description: Device group.
      example:
        group: staging
    FilterAttribute:
      required:
        - count
        - name
        - scope
      type: object
      properties:
        name:
          type: string
          description: Name of the attribute.
        scope:
          $ref: '#/components/schemas/Scope'
        count:
          type: integer
          description: Number of occurrences of the attribute in the database.
      description: Filterable attribute
      example:
        name: serial_no
        scope: inventory
        count: 10
    FilterDefinition:
      type: object
      properties:
        name:
          type: string
          description: Name of the filter, must be unique.
          example: My filter
        terms:
          type: array
          description: List of filter predicates, chained with boolean AND operators to build the search condition definition.
          items:
            $ref: '#/components/schemas/FilterPredicate'
      description: Filter definition
    NewDeviceInternalProvisionTypeInternal:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID of the new device.
        status:
          type: string
          enum:
            - accepted
            - noauth
            - pending
            - preauthorized
            - rejected
          description: Authorization status for the device.
        auth_sets:
          type: array
          items:
            $ref: '#/components/schemas/AuthSet'
        created_ts:
          type: string
          format: date-time
          description: The creation timestamp of the device.
      required:
        - id
    Integration:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: A unique integration identifier generated by the mender server
        provider:
          type: string
          enum:
            - iot-hub
            - iot-core
            - webhook
        credentials:
          $ref: '#/components/schemas/Credentials'
        description:
          type: string
          description: A short human readable description (max 1024 characters).
        scopes:
          type: array
          items:
            type: string
            enum:
              - deviceauth
              - inventory
          description: |
            An array of scopes for the integration. Currently we support deviceauth
            and inventory scopes. The former will match the events related to a device
            state (accepted, decomissioned), while the latter the inventory changed event.
      required:
        - provider
        - credentials
    Credentials:
      oneOf:
        - $ref: '#/components/schemas/AWSCredentials'
        - $ref: '#/components/schemas/AzureSharedAccessSecret'
        - $ref: '#/components/schemas/HTTP'
      discriminator:
        propertyName: type
        mapping:
          aws: '#/components/schemas/AWSCredentials'
          sas: '#/components/schemas/AzureSharedAccessSecret'
          http: '#/components/schemas/HTTP'
    AWSCredentials:
      type: object
      description: AWS credentials in the form of access key id and secret access key, a region and a device policy name.
      properties:
        type:
          description: The credential type
          type: string
          enum:
            - aws
        aws:
          type: object
          properties:
            access_key_id:
              type: string
            secret_access_key:
              type: string
            region:
              type: string
            device_policy_name:
              type: string
          required:
            - access_key_id
            - secret_access_key
            - region
            - device_policy_name
      required:
        - type
        - aws
    AzureSharedAccessSecret:
      type: object
      description: Shared Access Secret is an authentication mechanism in the form of a connection string for Azure IoT Hub.
      properties:
        type:
          description: The credential type
          type: string
          enum:
            - sas
        connection_string:
          type: string
      required:
        - type
        - connection_string
    DeviceState:
      type: object
      properties:
        desired:
          description: The desired state for the device, as reported by the cloud/user.
          additionalProperties: true
        reported:
          description: State reported by the device, this cannot be changed from the cloud.
          additionalProperties: true
    HTTP:
      type: object
      description: HTTP Webhook configuration.
      properties:
        type:
          description: The credential type
          type: string
          enum:
            - http
        http:
          type: object
          properties:
            url:
              type: string
              description: The destination URL for the webhook. The webhook will send POST requests with event details to this target URL.
            secret:
              type: string
              description: An optional secret used to verify the integrity of the payload. The string must be in hexadecimal format.
              pattern: '[0-9a-f]{1,64}'
          required:
            - url
      required:
        - type
        - http
    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: A unique event identifier generated by the Mender server
        type:
          type: string
          enum:
            - device-provisioned
            - device-decommissioned
            - device-status-changed
            - device-inventory-changed
          description: Type of the event
        delivery_statuses:
          type: array
          items:
            type: object
            properties:
              integration_id:
                type: string
                description: The ID of the integration the status belongs.
              success:
                type: boolean
                description: Whether the event hook was executed successfully.
              status_code:
                type: integer
                description: The (HTTP) status code of the hook.
              error:
                type: string
                description: An error message if the hook failed.
            required:
              - integration_id
              - success
        time:
          type: string
          format: date-time
          description: Creation timestamp
        data:
          oneOf:
            - $ref: '#/components/schemas/DeviceAuthEvent'
            - $ref: '#/components/schemas/DeviceInventoryEvent'
          discriminator:
            propertyName: type
            mapping:
              device-provisioned: '#/components/schemas/DeviceAuthEvent'
              device-decommissioned: '#/components/schemas/DeviceAuthEvent'
              device-status-changed: '#/components/schemas/DeviceAuthEvent'
              device-inventory-changed: '#/components/schemas/DeviceInventoryEvent'
    DeviceAuthEvent:
      type: object
      description: 'DeviceAuthEvent describes an event that relates to changes to a device''s authentication data. The properties included depends on the event type: device provisioning includes the entire device with the accepted authentication set, status change events only includes the device id and the new status, and device decommissioning will only include the device id.'
      properties:
        id:
          type: string
          description: Device unique ID.
        status:
          type: string
          description: The authentication status of the device.
        auth_sets:
          type: array
          items:
            $ref: '#/components/schemas/AuthSet'
        created_ts:
          type: string
          format: date-time
          description: The time the device was initialized in Mender.
      required:
        - id
    DeviceInventoryEvent:
      type: object
      description: DeviceInventoryEvent describes an event that relates to changes to a device's inventory data.
      properties:
        device_id:
          type: string
          description: Device unique ID.
        tenant_id:
          type: string
          description: Tenant ID.
        inventory:
          type: object
          description: Arbitrary key-value pairs of inventory attributes as device has sent them
      required:
        - device_id
        - tenant_id
        - inventory
    TenantUpdateInternal:
      type: object
      description: Update tenant information.
      properties:
        name:
          type: string
          description: Name of the tenant's organization.
        plan:
          type: string
          description: Plan assigned to the tenant account.
          enum:
            - os
            - enterprise
            - professional
        trial:
          type: boolean
          description: Whether this account is free trial.
        trial_expiration:
          type: string
          description: When trial evaluation expires.
          format: date-time
        addons:
          type: array
          description: Addons configuration.
          items:
            $ref: '#/components/schemas/Addon'
        api_limits:
          $ref: '#/components/schemas/TenantApiLimits'
        service_provider:
          type: boolean
          description: True if the tenant is a service provider tenant.
        max_child_tenants:
          type: string
          description: Maximum number of allowed child tenants
        suspend_at:
          type: string
          description: Planned suspention date and time, in ISO8601 format.
        customer_id:
          type: string
        subscription_id:
          type: string
        subscription_type:
          type: string
      example:
        name: Acme
        plan: os
        trial: true
        trial_expiration: '2021-01-01T00:00:00Z'
        suspend_at: '2021-01-01T00:00:00Z'
        api_limits:
          management:
            quota:
              max_calls: 100
              interval_sec: 60
          devices:
            quota:
              max_calls: 1000
              interval_sec: 60
            bursts:
              - action: PATCH
                uri: /api/devices/v1/inventory/device/attributes
                min_interval_sec: 10
              - action: POST
                uri: /api/devices/v1/deployments/device/deployments/next
                min_interval_sec: 60
    Addon:
      type: object
      properties:
        name:
          type: string
          description: Name of the addon (one of ['configure', 'troubleshoot']).
        enabled:
          type: boolean
          description: Enabled/disabled flag.
      description: Mender addon definition.
      example:
        name: troubleshoot
        enabled: true
    TenantAdditionalInfo:
      type: object
      properties:
        marketing:
          type: boolean
          description: Marketing
        campaign:
          type: string
          description: Campaign
      description: Additional information about a tenant.
      example:
        marketing: true
        campaign: Campaign
    ApiBurst:
      type: object
      properties:
        action:
          type: string
          description: HTTP verb.
        uri:
          type: string
          description: URI of the resource subject to the limit.
        min_interval_sec:
          type: integer
          description: Minimum allowed interval, in seconds, between subsequent calls to 'action' on 'uri' (10 = one call every 10 seconds, etc.)
      description: API burst limit definition.
      example:
        action: PATCH
        uri: /api/devices/v1/inventory/device/attributes
        min_interval_sec: 10
    ApiQuota:
      type: object
      properties:
        max_calls:
          type: integer
          description: |
            Maximum allowed number of calls within 'interval'.
            A value of 0 means 'no limit'.
        interval_sec:
          type: integer
          description: Interval definition, in seconds (60 = 1 minute, 3600 = 1 hour, etc.).
      description: API usage quota definition.
      example:
        max_calls: 100
        interval_sec: 3600
    ApiLimits:
      type: object
      properties:
        bursts:
          type: array
          description: Collection of api burst limit definitions over specified API resources.
          items:
            $ref: '#/components/schemas/ApiBurst'
        quota:
          $ref: '#/components/schemas/ApiQuota'
      description: Usage quota and burst limit definitions for an API type.
      example:
        bursts:
          - action: PATCH
            uri: /api/devices/v1/inventory/device/attributes
            min_interval_sec: 10
          - action: POST
            uri: /api/devices/v1/deployments/device/deployments/next
            min_interval_sec: 60
        quota:
          max_calls: 100
          interval_sec: 60
    TenantApiLimits:
      type: object
      properties:
        management:
          $ref: '#/components/schemas/ApiLimits'
        devices:
          $ref: '#/components/schemas/ApiLimits'
      description: API usage quota and burst limit definitions for a tenant - per API type.
      example:
        management:
          quota:
            max_calls: 100
            interval_sec: 60
        devices:
          quota:
            max_calls: 1000
            interval_sec: 60
          bursts:
            - action: PATCH
              uri: /api/devices/v1/inventory/device/attributes
              min_interval_sec: 10
            - action: POST
              uri: /api/devices/v1/deployments/device/deployments/next
              min_interval_sec: 60
    Tenant:
      description: Tenant descriptor.
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: string
          description: Tenant ID.
        name:
          type: string
          description: Name of the tenant's organization.
        tenant_token:
          type: string
          description: Currently used tenant token.
        status:
          type: string
          description: Status of the tenant account.
          enum:
            - active
            - suspended
        plan:
          type: string
          description: Plan assigned to the tenant account.
          enum:
            - os
            - enterprise
            - professional
        trial:
          type: boolean
          description: Whether this account is free trial.
        trial_expiration:
          type: string
          description: When trial evaluation expires.
          format: date-time
        addons:
          type: array
          description: Addons configuration.
          items:
            $ref: '#/components/schemas/Addon'
        service_provider:
          type: boolean
          description: Whether this account is a service provider.
        parent_tenant_id:
          type: string
          description: The ID of the service provider tenant managing this tenant.
        additional_info:
          $ref: '#/components/schemas/TenantAdditionalInfo'
        api_limits:
          $ref: '#/components/schemas/TenantApiLimits'
        created_at:
          type: string
          description: Creation date and time, in ISO8601 format.
        updated_at:
          type: string
          description: Last update date and time, in ISO8601 format.
        device_count:
          type: integer
          description: Count of accepted devices for the tenant.
        device_limit:
          type: integer
          description: Device limit for the tenant.
        device_limits:
          type: object
          properties:
            max_devices:
              $ref: '#/components/schemas/DeviceLimitTenant'
            max_micro_devices:
              $ref: '#/components/schemas/DeviceLimitTenant'
            max_system_devices:
              $ref: '#/components/schemas/DeviceLimitTenant'
      example:
        id: 507f191e810c19729de860ea
        name: Acme
        status: active
        plan: os
        api_limits:
          management:
            quota:
              max_calls: 100
              interval_sec: 60
          devices:
            quota:
              max_calls: 1000
              interval_sec: 60
            bursts:
              - action: PATCH
                uri: /api/devices/v1/inventory/device/attributes
                min_interval_sec: 10
              - action: POST
                uri: /api/devices/v1/deployments/device/deployments/next
                min_interval_sec: 60
        created_at: '2019-12-12T12:00:00Z'
        updated_at: '2023-11-10T15:15:00Z'
    TenantStatusTypeManagement:
      required:
