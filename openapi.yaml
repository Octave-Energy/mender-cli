          description: Service is temporarily unavailable (currently unhealthy).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Workflows_other
  /api/v1/tenants/{id}:
    delete:
      summary: Delete all the data belonging to a given tenant
      description: |
        Removes all the jobs that have the given tenant id in input parameters.
      operationId: Delete tenant data internal workflows
      parameters:
        - name: id
          in: path
          description: Tenant id to remove.
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Tenant data removed
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - Workflows_other
  /api/v1/workflow/{name}:
    post:
      summary: Start a new workflow
      description: |
        Starts a new workflow given by the name path-parameter.
      operationId: Start Workflow
      parameters:
        - name: name
          in: path
          description: Workflow identifier.
          required: true
          schema:
            type: string
      requestBody:
        description: Contains the definition of the job to be started.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
        required: true
      responses:
        '201':
          description: Workflow created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
        '400':
          $ref: '#/components/responses/InvalidRequestError'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - Workflows_other
  /api/v1/workflow/{name}/batch:
    post:
      summary: Start a batch of workflows
      description: |
        Starts a new workflow given by the name path-parameter.
      operationId: Start Batch Workflows
      parameters:
        - name: name
          in: path
          description: Workflow identifier.
          required: true
          schema:
            type: string
      requestBody:
        description: Contains the definition of the job to be started.
        content:
          application/json:
            schema:
              type: array
              items:
                type: array
                items:
                  $ref: '#/components/schemas/InputParameter'
        required: true
      responses:
        '201':
          description: Workflows created successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    error:
                      type: string
        '400':
          $ref: '#/components/responses/InvalidRequestError'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - Workflows_other
  /api/v1/metadata/workflows:
    get:
      summary: Get all workflow definitions
      operationId: List Workflows
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Workflow'
      tags:
        - Workflows_other
    post:
      summary: Register a new workflow
      operationId: Register Workflow
      requestBody:
        description: Workflow definition.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Workflow'
        required: true
      responses:
        '201':
          description: Successful response.
          content: {}
        '400':
          $ref: '#/components/responses/InvalidRequestError'
        '409':
          $ref: '#/components/responses/ConflictError'
      tags:
        - Workflows_other
  /api/v1/jobs/{id}:
    get:
      summary: Gets the job for the given id.
      description: |
        Gets the job object for the given job id.
      operationId: Job Structure
      parameters:
        - name: id
          in: path
          description: Job identifier
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobObject'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - Workflows_other
components:
