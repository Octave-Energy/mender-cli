    FilterValue:
      description: |
        The filter value.

        Attribute type is implicit, inferred from the JSON type.

        Supported types: number, string, array of numbers, array of strings.
        Mixed arrays are not allowed.
        For $exists type, a boolean is required.
      oneOf:
        - type: string
        - type: number
        - type: array
          items:
            type: string
        - type: array
          items:
            type: number
        - type: boolean
    FilterPredicate:
      required:
        - attribute
        - scope
        - type
        - value
      type: object
      properties:
        scope:
          $ref: '#/components/schemas/Scope'
        attribute:
          type: string
          description: Attribute name.
        type:
          type: string
          description: |
            Type or operator of the filter predicate.

            | *Operator* | *Name*                       | *Argument type* |
            |:----------:|:-----------------------------|:----------------|
            | $eq        | Equal (`==`)                 | any             |
            | $ne        | Not equal (`!=`)             | any             |
            | $gt        | Greater than (`>`)           | any             |
            | $gte       | Greater than or equal (`>=`) | any             |
            | $lt        | Less than (`<`)              | any             |
            | $lte       | Less than or equal (`<=`)    | any             |
            | $ltne      | Less than or does not exist  | any             |
            | $exists    | Attribute exists             | bool            |
            | $in        | Is an element of             | array           |
            | $nin       | Is not an element of         | array           |
            | $regex     | Regex filter                 | string          |
          enum:
            - $eq
            - $gt
            - $gte
            - $in
            - $lt
            - $lte
            - $ltne
            - $ne
            - $nin
            - $exists
            - $regex
        value:
          allOf:
            - $ref: '#/components/schemas/FilterValue'
            - description: |
                The value of the attribute to be used in filtering.

                Attribute type is implicit, inferred from the JSON type.

                Supported types: number, string, array of numbers, array of strings.
                Mixed arrays are not allowed.

                The $exists operator expects a boolean value: true means the specified
                attribute exists, false means the specified attribute doesn't exist.

                The $regex operator expects a string as a Perl compatible regular expression
                (PCRE), automatically anchored by ^. If the regular expression is not valid,
                the filter will produce no results. If you need to specify options and flags,
                you can provide the full regex in the format of /regex/flags, for example
                `/[a-z]+/i`.
      description: Attribute filter predicate
      example:
        attribute: serial_no
        scope: inventory
        type: $eq
        value: '123456789'
    SortCriteria:
      description: Sort criteria definition
      example:
        attribute: serial_no
        scope: inventory
        order: asc
      required:
        - attribute
        - order
        - scope
      type: object
      properties:
        attribute:
          type: string
          description: Attribute name.
        scope:
          $ref: '#/components/schemas/Scope'
        order:
          type: string
          description: Sort order.
          enum:
            - asc
            - desc
    SelectAttribute:
      required:
        - attribute
        - scope
      type: object
      properties:
        attribute:
          type: string
          description: Attribute name.
        scope:
          $ref: '#/components/schemas/Scope'
      description: Inventory attribute
      example:
        attribute: serial_no
        scope: inventory
    SearchParams:
      type: object
      properties:
        page:
          type: integer
          description: Starting page.
        per_page:
          type: integer
          description: Number of results per page.
        device_ids:
          type: array
          description: List of device IDs
          items:
            type: string
            description: Attribute filter predicate
        text:
          type: string
          description: Free-text search query
        filters:
          type: array
          description: List of filter predicates, chained with boolean AND operators to build the search condition definition.
          items:
            $ref: '#/components/schemas/FilterPredicate'
        sort:
          type: array
          description: List of ordered sort criterias
          items:
            $ref: '#/components/schemas/SortCriteria'
        attributes:
          type: array
          description: List of attributes to select and return
          items:
            $ref: '#/components/schemas/SelectAttribute'
    DeviceInventory:
      type: object
      properties:
        id:
          type: string
          description: Mender-assigned unique ID.
        updated_ts:
          type: string
          description: Timestamp of the most recent attribute update.
        attributes:
          type: array
          description: A list of attribute descriptors.
          items:
            $ref: '#/components/schemas/Attribute'
      example:
        id: 291ae0e5956c69c2267489213df4459d19ed48a806603def19d417d004a4b67e
        attributes:
          - name: ip_addr
            scope: inventory
            value: 1.2.3.4
            description: IP address
          - name: mac_addr
            scope: inventory
            value: 00.01:02:03:04:05
            description: MAC address
        updated_ts: '2016-10-03T16:58:51.639Z'
    Filter:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: string
          description: |
            Unique identifier of the saved filter.
        name:
          type: string
          description: |
            Name of the saved filter.
        terms:
          type: array
          items:
            $ref: '#/components/schemas/FilterPredicate'
      description: Filter definition
      example:
        id: myfilter
        name: My Filter
        terms:
          - scope: inventory
            attribute: serial_no
            type: $eq
            value: '123456789'
    Tag:
      required:
