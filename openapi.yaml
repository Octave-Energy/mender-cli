    patch:
      description: |
        Updates the deployment's update control map.
        It is possible to update the deployment's update control map
        only if the map exists.
        In case the control map does not exist,
        409 Conflict error will be returned.
      operationId: Patch Deployment Control Map
      parameters:
        - description: Deployment identifier.
          in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
