        id: 84430f18-d464-5194-b8ef-b1a15161bb4c
        kind: sso/saml
    User:
      required:
        - email
        - id
      type: object
      properties:
        email:
          type: string
          description: A unique email address.
        id:
          type: string
          description: User Id.
        created_ts:
          type: string
          description: |
            Server-side timestamp of the user creation.
          format: date-time
        updated_ts:
          type: string
          description: |
            Server-side timestamp of the last user information update.
          format: date-time
        login_ts:
          type: string
          description: Timestamp the of last successful login.
          format: date-time
        verified:
          type: boolean
          description: |
            Indicates if the user's email address has been verified.
        tfa_status:
          type: string
          description: User Two Factor Authentication status.
        roles:
          type: array
          description: List of user roles.
          items:
            title: ListOfRoles
            type: string
            description: Role name
        send_reset_password:
          type: boolean
          description: Flag indicating wether to trigger password reset on user creation.
        sso:
          type: array
          description: SSO login schemes.
          items:
            $ref: '#/components/schemas/SsoObject'
        tenant_id:
          type: string
          description: Tenant identifier of a tenant, user will log in to by default.
        tenant_ids:
          type: array
          description: List of tenant Ids user can login to.
          items:
            type: string
      description: User descriptor.
      example:
        email: user@acme.com
        id: 806603def19d417d004a4b67e
        created_ts: '2020-07-06T15:04:49.114046203+02:00'
        updated_ts: '2020-07-07T01:04:49.114046203+02:00'
    TenantInfo:
      type: object
      properties:
        tenant_id:
          type: string
          description: Tenant identifier of a tenant, user will log in to by default.
        tenant_ids:
          type: array
          description: List of tenant Ids user can login to.
          items:
            type: string
    TenantIdName:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: string
          description: Tenant identifier.
        name:
          type: string
          description: Tenant name.
    TenantsIdName:
      type: array
      items:
        $ref: '#/components/schemas/TenantIdName'
    UserWithTenantInfo:
      allOf:
        - $ref: '#/components/schemas/User'
        - $ref: '#/components/schemas/TenantInfo'
        - type: object
          properties:
            tenants:
              $ref: '#/components/schemas/TenantsIdName'
    UserNewInternal:
      required:
        - email
        - password
      type: object
      properties:
        email:
          type: string
          description: User's email.
          format: email
        password:
          type: string
          description: User's password.
        propagate:
          type: boolean
          description: |
            This paramter is deprecated _since Thu Jul 6 2023_, the propagation
            of user information to tenantadm is disabled permanently.
        magic_id:
          type: string
          description: Unique id to allow a user to log in using a magic link
          format: uuid
        send_reset_password:
          type: boolean
          description: Send reset password email to the user
      description: New user descriptor.
      example:
        email: user@acme.com
        password: secret
        propagate: false
        magic_id: a30a780b-b843-5344-80e3-0fd95a4f6fc3
    Emails:
      required:
        - emails
      type: object
      properties:
        emails:
          type: array
          description: List of users emails.
          items:
            type: string
      example:
        emails:
          - demo@example.com
          - admin@example.com
    UseradmLimit:
      required:
        - max
      type: object
      properties:
        count:
          type: integer
        max:
          type: integer
      description: Tenant account limits.
      example:
        count: 10
        max: 20
    Limits:
      required:
        - users
      type: object
      properties:
        users:
          $ref: '#/components/schemas/UseradmLimit'
      description: Tenant account limits.
      example:
        users:
          max: 10
          count: 2
        limit: 123
    Features:
      type: object
