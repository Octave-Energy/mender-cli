        audit_logs:
          type: boolean
        dynamic_groups:
          type: boolean
        terminal:
          type: boolean
        file_transfer:
          type: boolean
        configuration:
          type: boolean
        monitoring:
          type: boolean
        reporting:
          type: boolean
      description: Features descriptor.
      example:
        rbac: true
        audit_logs: false
        dynamic_groups: false
        terminal: true
        file_transfer: true
        configuration: true
        monitoring: true
        reporting: true
    Plan:
      required:
        - display_name
        - features
        - name
      type: object
      properties:
        name:
          type: string
          description: |
            Unique name of the plan.
        display_name:
          type: string
          description: |
            Short information about the plan.
        features:
          $ref: '#/components/schemas/Features'
      description: Plan descriptor.
      example:
        name: mender-enterprise
        display_name: Mender Enterprise
        features:
          rbac: true
          audit_logs: false
          dynamic_groups: false
          terminal: true
          file_transfer: true
          configuration: true
          monitoring: true
    PlanLimits:
      type: object
      properties:
        devices:
          type: integer
        users:
          type: integer
        audit_logs_days:
          type: integer
      description: Plan limits descriptor.
      example:
        devices: 10
        users: 2
        audit_logs_days: 2
    PlanBindingDetails:
      type: object
      properties:
        plan:
          $ref: '#/components/schemas/Plan'
        limits:
          $ref: '#/components/schemas/PlanLimits'
      description: Combination of plan and limits objects.
      example:
        plan:
          product: Mender
          name: mender-enterprise
          display_name: Mender Enterprise
          features:
            rbac: true
            audit_logs: true
        limits:
          devices: 10
          users: 2
          audit_logs_days: 2
    PlanBinding:
      type: object
      properties:
        plan_name:
          type: string
        limits:
          $ref: '#/components/schemas/PlanLimits'
      description: Combination of plan and limits objects.
      example:
        plan_name: mender-enterprise
        limits:
          devices: 10
          users: 2
          audit_logs_days: 2
    TenantIdsData:
      required:
        - tenant_ids
      type: object
      properties:
        tenant_ids:
          type: array
          items:
            title: ListOfIds
            type: string
            description: tenant ids
        role:
          type: string
          description: 'Optional RBAC role name to assign to the user. Defaults to: RBAC_ROLE_OBSERVER.'
      description: Tenant ids data.
      example:
        tenant_ids:
          - 65c76fd6e15517b2f0fbfdf1
          - 65c76fda5e6177ca400a9d4d
        role: RBAC_ROLE_OBSERVER
    LoginOptions:
      type: object
      properties:
        no_expiry:
          type: boolean
          description: Generate a JWT token with no expiration date.
        token2fa:
          type: string
          description: |
            Two factor authentication token, required if two factor authentication is
              enabled and tenant's plan is Professional or Enterprise.
      description: Log in options
      example:
        no_expiry: true
        token2fa: '012234'
    UserNew:
      required:
        - email
      type: object
      properties:
        email:
          type: string
          description: A unique email address. Non-ascii characters are invalid.
        password:
          type: string
          description: Password.
        roles:
          type: array
          description: 'Optional RBAC roles to assign to the user. Defaults to: RBAC_ROLE_PERMIT_ALL.'
          items:
            title: ListOfRoles
            type: string
            description: Role name
        send_reset_password:
          type: boolean
          description: Flag indicating wether to trigger password reset on user creation.
      description: New user descriptor.
      example:
        email: user@acme.com
        password: mypass1234
        roles:
          - RBAC_ROLE_OBSERVER
        send_reset_password: true
    UserUpdate:
      type: object
      properties:
        email:
          type: string
          description: A unique email address.
        password:
          type: string
          description: New password.
        current_password:
          type: string
          description: Current password.
        roles:
          type: array
          description: List of roles for the user. If not provided existing roles are kept.
          items:
            title: ListOfRoles
            type: string
            description: Role name
      description: Update user information.
      example:
        email: new_email@acme.com
        roles:
          - RBAC_ROLE_DEPLOY_GROUP_TESTING_DEVICES
          - RBAC_ROLE_READ_ONLY
        password: new password
        current_password: old password
    OwnUserUpdate:
      type: object
      properties:
        email:
          type: string
          description: A unique email address.
        password:
          type: string
          description: New password.
        current_password:
          type: string
          description: Current password.
      description: Update user information.
      example:
        email: new_email@acme.com
        password: new password
        current_password: old password
    PersonalAccessTokenRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: Name of a token.
        expires_in:
          type: integer
          description: |
            Expiration time in seconds (maximum one year - 31536000s).
            If you omit it or set it to zero, the Personal Access Token will never expire.
      description: Personal Access Token Request.
      example:
        name: my_personal_token
        expires_in: 28800
    PersonalAccessToken:
      required:
        - created_ts
        - expiration_date
        - id
        - name
      type: object
      properties:
        id:
          type: string
          description: Token identifier.
        name:
          type: string
          description: Name of a token.
        last_used:
          type: string
          description: |
            Date of last usage of a token. The accuracy is 5 minutes.
          format: date-time
        expiration_date:
          type: string
          description: Expiration date.
          format: date-time
        created_ts:
          type: string
          description: |
            Server-side timestamp of the token creation.
          format: date-time
      description: Personal Access Token Object.
      example:
        id: 806603def19d417d004a4b67e
        name: my_personal_token
        last_used: '2022-07-05T11:11:35.725Z'
        expiration_date: '2023-10-16T07:28:34.725Z'
        created_ts: '2022-07-05T11:03:27.725Z'
    Settings:
      type: object
      properties:
        2fa:
          type: string
          description: Enable/disable two-factor authentication for this user.
          enum:
            - enabled
            - disabled
          x-mender-plan:
            - professional
            - enterprise
      description: User settings.
    PasswordResetRequest:
      required:
        - email
      type: object
      properties:
        email:
          type: string
          description: User's email address
      description: Password reset request
      example:
        email: user@mender.io
    PasswordResetCompletion:
      required:
        - password
        - secret_hash
      type: object
      properties:
        secret_hash:
          type: string
          description: Secret hash received by email by the user
        password:
          type: string
          description: New password of the user
      description: Password reset completion
      example:
        secret_hash: 16fd2706-8baf-433b-82eb-8c7fada847da
        password: new password
    EmailVerificationRequest:
      required:
        - email
      type: object
      properties:
        email:
          type: string
          description: User's email address
      description: Email Verification request
      example:
        email: user@mender.io
    EmailVerificationCompletion:
      required:
        - secret_hash
      type: object
      properties:
        secret_hash:
          type: string
          description: Secret hash received by email by the user
      description: Email Verification completion
      example:
        secret_hash: 16fd2706-8baf-433b-82eb-8c7fada847da
    SAMLMetadata:
      required:
        - id
