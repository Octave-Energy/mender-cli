      parameters:
        - in: header
          name: Connection
          schema:
            type: string
            enum:
              - Upgrade
          description: Standard websocket request header.
        - in: header
          name: Upgrade
          schema:
            type: string
            format: base64
            enum:
              - websocket
          description: Standard websocket request header.
        - in: header
          name: Sec-Websocket-Key
          schema:
            type: string
            format: base64
          description: Standard websocket request header.
        - in: header
          name: Sec-Websocket-Version
          schema:
            type: integer
            enum:
              - 13
          description: Standard websocket request header.
      responses:
        '101':
          description: |
            Successful response - change to websocket protocol.
          headers:
            Sec-Websocket-Accept:
              schema:
                type: string
                format: base64
              description: Standard websocket upgrade response header.
            Upgrade:
              schema:
                type: string
                enum:
                  - websocket
        '400':
