    TaskResultHTTPRequest:
      example:
        body: body
        statusCode: 6
      properties:
        statusCode:
          type: integer
        body:
          type: string
      type: object
    TaskResultHTTPResponse:
      example:
        headers:
          - headers
          - headers
        method: method
        body: body
        uri: uri
      properties:
        uri:
          type: string
        method:
          type: string
        headers:
          items:
            type: string
          type: array
        body:
          type: string
      type: object
    TenantNew:
      type: object
      properties:
        tenant_id:
          type: string
          description: ID of new tenant.
      required:
        - tenant_id
    IdentityData:
      description: Device identity attributes, in the form of a JSON structure. The attributes are completely vendor-specific, the provided ones are just an example. In reference implementation structure contains vendor-selected fields, such as MACs, serial numbers, etc.
      type: object
      additionalProperties: true
      example:
        mac: '00:01:02:03:04:05'
        sku: My Device 1
        sn: SN1234567890
    AuthSet:
      type: object
      description: AuthSet describes the identity a device uses to authenticate with the Mender server.
      properties:
        id:
          type: string
          description: The unique ID of the authentication set.
        device_id:
          type: string
          description: The unique ID of the device the authentication set belongs.
        identity_data:
          $ref: '#/components/schemas/IdentityData'
        pubkey:
          type: string
          description: 'The device''s public key (PEM encoding). generated by the device or pre-provisioned by the vendor. Currently supported public algorithms are: RSA, Ed25519 and ECDSA P-256.'
        tier:
          type: string
          description: A device tier.
          enum:
            - standard
            - micro
            - system
        status:
          type: string
          description: Authorization status of the set.
        ts:
          type: string
          format: date-time
          description: The creation timestamp of the authentication set.
    ProvisionDevice:
      type: object
      properties:
        device_id:
          type: string
          format: uuid
          description: ID of the new device.
      required:
        - device_id
    TenantLimit:
      description: Tenant account limit.
      type: object
      properties:
        tenant_id:
          type: string
        current_value:
          type: integer
        limit:
          type: integer
      required:
        - tenant_id
        - current_value
        - limit
      example:
        tenant_id: 58be8208dd77460001fe0d78
        current_value: 42
        limit: 123
    Scope:
      type: string
      description: |
        The scope of the attribute.

        Scope is a string and acts as namespace for the attribute name.

        * __inventory__: Attributes reported by the device.
        * __system__: Attributes populated by the mender-server.
        * __identity__: Device's identity attributes provided in the device's auth request.
        * __monitor__: Attributes populated by the monitoring add-on.
        * __tags__: User-defined attributes associated with the device.
      enum:
        - system
        - identity
        - inventory
        - monitor
        - tags
    DeviceLimitTenant:
      description: Tenant device limits per tier.
      type: object
      properties:
        name:
          type: string
        tenant_id:
          type: string
        current_value:
          type: integer
        value:
          type: integer
      required:
        - name
        - current_value
        - value
      example:
        name: max_micro_devices
        current_value: 255
        value: 1024
        tenant_id: 69072e3c0d4f7bebcd5470b3
    DeviceLimitTenantPut:
      description: Device limit.
      type: object
      properties:
        name:
          type: string
        value:
          type: integer
      required:
        - name
        - value
      example:
        name: max_micro_devices
        value: 1024
    Actor:
      required:
        - id
        - type
      type: object
      properties:
        id:
          type: string
          description: |
            A unique identifier of the actor.
        type:
          type: string
          description: |
            The type of the actor.
          enum:
            - user
            - device
        email:
          type: string
          description: |
            The email address of the user.
        identity_data:
          type: string
          description: |
            The identity data of the device.
      description: |
        The actor may be a user or device.
        Depending on the type of the actor different information will be available.
    AuditlogsTenant:
      required:
        - id
      type: object
      properties:
        id:
          type: string
          description: The id of a tenant.
        name:
          type: string
          description: The name of a tenant.
        parent:
          type: string
          description: The id of a parent tenant.
      description: The tenant descriptor.
      example:
        id: 66e456ef8437e701abc42a9c
        name: Devel Tenant
        parent: 66e457193c5f69b99d74d2cb
    AuditlogsUser:
      required:
        - email
      type: object
      properties:
        email:
          type: string
          description: Email address of the user.
      description: User descriptor.
      example:
        email: user@acme.com
    Deployment:
      required:
        - artifact_name
        - name
      type: object
      properties:
        name:
          type: string
        artifact_name:
          type: string
      description: The deployment descriptor.
      example:
        name: production
        artifact_name: Application 0.0.1
    AuditlogsArtifact:
      required:
        - name
      type: object
      properties:
        name:
          type: string
      description: The artifact descriptor.
      example:
        name: artifact_name_1
    AuditlogsDevice:
      required:
        - identity_data
      type: object
      properties:
        id:
          type: string
          description: Device ID.
        identity_data:
          type: string
          description: Vendor-specific JSON representation of the device identity data (MACs, serial numbers, etc.).
      description: Device descriptor.
      example:
        id: e1ba5bee-c45d-11eb-887d-3fd47bdc3990
        identity_data: '{"mac_address": "2C:54:91:88:C9:E3", "sn": "1229224105105176"}'
    Object:
      required:
        - id
        - type
      type: object
      properties:
        id:
          type: string
          description: |
            A unique identifier of the object.
        type:
          type: string
          description: |
            The type of the object.
          enum:
            - tenant
            - user
            - deployment
            - artifact
            - device
        tenant:
          $ref: '#/components/schemas/AuditlogsTenant'
        user:
          $ref: '#/components/schemas/AuditlogsUser'
        deployment:
          $ref: '#/components/schemas/Deployment'
        artifact:
          $ref: '#/components/schemas/AuditlogsArtifact'
        device:
          $ref: '#/components/schemas/AuditlogsDevice'
      description: |
        Various types of objects are supported.
        Depending on the type of object different information will be available.
    AuditLog:
      required:
        - action
        - actor
        - object
        - time
      type: object
      properties:
        actor:
          $ref: '#/components/schemas/Actor'
        time:
          type: string
          format: date-time
        action:
          type: string
          enum:
            - create
            - update
            - delete
            - abort
            - reject
            - decommission
            - open_terminal
            - close_terminal
            - open_portforward
            - close_portforward
            - download_file
            - upload_file
            - set_configuration
            - deploy_configuration
            - upload
        object:
          $ref: '#/components/schemas/Object'
        change:
          type: string
      description: Audit log entry
    Artifact:
      description: Detailed artifact.
      example:
        id: 0c13a0e6-6b63-475d-8260-ee42a590e8ff
        name: Application 1.0.0
        description: Johns Monday test build
        device_types_compatible:
          - Beagle Bone
        info:
          format: mender
          version: 3
        updates:
          - type_info:
              type: rootfs-image
            files:
              - name: rootfs-image-1
                checksum: cc436f982bc60a8255fe1926a450db5f195a19ad
                size: 123
                date: 2016-03-11T13:03:17.063+0000
            meta_data: []
        artifact_provides:
          artifact_name: test
          rootfs-image.checksum: 32714818ad6f98ee0185a52e23a475d89122e3efd2b2c26c733781c28e798c99
          rootfs-image.version: test
        artifact_depends:
          device_type:
            - test
        clears_artifact_provides:
          - rootfs-image.*
        size: 36891648
        modified: '2016-03-11T13:03:17.063493443Z'
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        device_types_compatible:
          description: An array of compatible device types.
          items:
            type: string
          type: array
        info:
          $ref: '#/components/schemas/ArtifactInfo'
        signed:
          description: Idicates if artifact is signed or not.
          type: boolean
        updates:
          items:
            $ref: '#/components/schemas/Update'
          type: array
        artifact_provides:
          additionalProperties:
            type: string
          description: |
            List of Artifact provides.

            Map of key/value pairs, where both keys and values are strings.
          type: object
        artifact_depends:
          additionalProperties:
            items:
              type: string
            type: array
          description: |
            List of Artifact depends.

            Map of key/value pairs, where keys are strings and values are lists of strings.
          type: object
        clears_artifact_provides:
          description: List of Clear Artifact provides.
          items:
            type: string
          type: array
        size:
          description: |
            Artifact total size in bytes - the size of the actual file that will be transferred to the device (compressed).
          type: integer
        modified:
          description: |
            Represents creation / last edition of any of the artifact properties.
          format: date-time
          type: string
      required:
        - device_types_compatible
        - id
        - modified
        - name
      type: object
    DeploymentStatus:
      example:
        status: success
      properties:
        status:
          enum:
            - installing
            - pause_before_installing
            - downloading
            - pause_before_rebooting
            - rebooting
            - pause_before_committing
            - success
            - failure
            - already-installed
          type: string
        substate:
          description: Additional state information
          type: string
      required:
        - status
      type: object
    DeploymentInstructions:
